<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Submission Saved - Success</title>
  <!-- Modern Premium Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* Premium Modern Dark System Design matching main form */
    :root {
      --bg-gradient-start: #0D1520;
      --bg-gradient-end: #13202B;
      --card-bg: rgba(25, 39, 52, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #FFFFFF;
      --text-secondary: #A8B0B8;
      --text-disabled: #6F7780;
      --cta-color: #1877F2;
      --cta-hover: #1565D8;
      --success-accent: #00E676;
      --font-main: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
      font-family: var(--font-main);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      overflow-x: hidden;
    }

    /* Success Card Container */
    .success-container {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 48px 32px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
      animation: scaleUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes scaleUp {
      from {
        opacity: 0;
        transform: scale(0.95) translateY(10px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    /* Success Icon & Animation */
    .success-icon-wrapper {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      background: rgba(0, 230, 118, 0.1);
      border-radius: 50%;
      margin-bottom: 24px;
      border: 1.5px solid rgba(0, 230, 118, 0.25);
      animation: pulse 2s infinite;
    }

    .success-icon {
      width: 40px;
      height: 40px;
      fill: var(--success-accent);
    }

    @keyframes pulse {
      0% {
        box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.2);
      }
      70% {
        box-shadow: 0 0 0 16px rgba(0, 230, 118, 0);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(0, 230, 118, 0);
      }
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 12px;
      background: linear-gradient(to right, #FFFFFF, #E2E8F0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .success-message {
      font-size: 18px;
      color: var(--text-primary);
      margin-bottom: 24px;
      font-weight: 500;
    }

    .info-note {
      font-size: 14px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 32px;
    }

    /* Back Button */
    .btn-back {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-primary);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 14px 20px;
      font-size: 15px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-back:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-1px);
    }

    .btn-back:active {
      transform: translateY(1px);
    }
  </style>
</head>
<body>

  <div class="success-container">
    <div class="success-icon-wrapper">
      <svg class="success-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
      </svg>
    </div>
    
    <h1>Saved successfully 😎</h1>
    
    <p class="info-note">
      Your submission has been securely written as a private JSON file to Vercel Blob storage.
    </p>

    <a href="/index.html" class="btn-back">Submit Another Response</a>
  </div>

</body>
</html>
