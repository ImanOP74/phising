<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blob Data Viewer - Admin Demo</title>
  <!-- Modern Premium Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* Premium Modern Dark System Design matching the submission form */
    :root {
      --bg-gradient-start: #0D1520;
      --bg-gradient-end: #13202B;
      --card-bg: rgba(25, 39, 52, 0.4);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-primary: #FFFFFF;
      --text-secondary: #A8B0B8;
      --text-disabled: #6F7780;
      --cta-color: #1877F2;
      --cta-hover: #1565D8;
      --success-accent: #00E676;
      --font-main: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
      font-family: var(--font-main);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 40px 24px;
    }

    .wrapper {
      max-width: 1000px;
      margin: 0 auto;
    }

    /* Header Section */
    .header-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      gap: 16px;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #FFFFFF, #E2E8F0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* Actions and Buttons */
    .actions {
      display: flex;
      gap: 12px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 500;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
    }

    .btn-primary {
      background-color: var(--cta-color);
      color: #FFFFFF;
      border: none;
    }

    .btn-primary:hover {
      background-color: var(--cta-hover);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text-primary);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(255, 255, 255, 0.15);
    }

    /* Responsive Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
      margin-top: 16px;
    }

    /* Sleek Cards */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(255, 255, 255, 0.15);
      box-shadow: 0 16px 36px rgba(0, 0, 0, 0.3);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .user-badge {
      display: inline-flex;
      align-items: center;
      background: rgba(24, 119, 242, 0.1);
      color: #3A91FF;
      border: 1px solid rgba(24, 119, 242, 0.2);
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* Structured Credential Layout */
    .card-body {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .credential-field {
      background: rgba(0, 0, 0, 0.25);
      border-radius: 10px;
      padding: 10px 14px;
      border: 1px solid rgba(255, 255, 255, 0.03);
    }
    
    .field-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-disabled);
      margin-bottom: 4px;
    }
    
    .field-value-wrapper {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }
    
    .field-value {
      font-size: 14px;
      color: var(--text-primary);
      font-family: 'Consolas', 'Courier New', monospace;
      word-break: break-all;
    }
    
    .copy-btn {
      background: transparent;
      border: none;
      color: var(--cta-color);
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: all 0.2s ease;
    }
    
    .copy-btn:hover {
      background: rgba(24, 119, 242, 0.15);
      color: #FFFFFF;
    }

    .card-footer {
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--text-disabled);
    }

    .timestamp {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .meta-link {
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .meta-link:hover {
      color: var(--cta-color);
    }

    /* Skeleton Loading State */
    .skeleton-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 24px;
      height: 220px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .skeleton-line {
      height: 16px;
      background: linear-gradient(90deg, rgba(255,255,255,0.03) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.03) 75%);
      background-size: 200% 100%;
      animation: loading 1.5s infinite;
      border-radius: 8px;
    }

    .skeleton-badge { width: 40%; height: 24px; }
    .skeleton-field { width: 100%; height: 48px; border-radius: 10px; }

    @keyframes loading {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* Empty State */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 24px;
      background: var(--card-bg);
      border: 1px dashed var(--card-border);
      border-radius: 24px;
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    /* Error Message Alert */
    .error-alert {
      background: rgba(255, 74, 90, 0.1);
      border: 1px solid rgba(255, 74, 90, 0.2);
      color: #FF4A5A;
      padding: 16px;
      border-radius: 12px;
      font-size: 14px;
      margin-bottom: 24px;
      display: none;
    }

    /* Modern Copy Toast Alert */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1877F2;
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 8px 24px rgba(24, 119, 242, 0.3);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 1000;
      pointer-events: none;
    }
    
    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* Mobile Responsive adjustments */
    @media (max-width: 600px) {
      body {
        padding: 24px 16px;
      }
      .header-bar {
        flex-direction: column;
        align-items: flex-start;
      }
      .actions {
        width: 100%;
      }
      .btn {
        flex: 1;
      }
    }
  </style>
</head>
<body>

  <div class="wrapper">
    <div class="header-bar">
      <div>
        <h1>Blob Data Viewer</h1>
        <p class="subtitle">Educational demo dashboard visualizing saved private Vercel Blobs</p>
      </div>
      <div class="actions">
        <a href="/index.html" class="btn btn-secondary">Submit New Form</a>
        <button id="refreshBtn" class="btn btn-primary">Refresh Data</button>
      </div>
    </div>

    <!-- Error Indicator -->
    <div id="errorAlert" class="error-alert"></div>

    <!-- Submissions Grid Container -->
    <div id="submissionsGrid" class="grid">
      <!-- Loading skeletons initially -->
      <div class="skeleton-card">
        <div class="skeleton-line skeleton-badge"></div>
        <div class="skeleton-line skeleton-field"></div>
        <div class="skeleton-line skeleton-field"></div>
      </div>
      <div class="skeleton-card">
        <div class="skeleton-line skeleton-badge"></div>
        <div class="skeleton-line skeleton-field"></div>
        <div class="skeleton-line skeleton-field"></div>
      </div>
      <div class="skeleton-card">
        <div class="skeleton-line skeleton-badge"></div>
        <div class="skeleton-line skeleton-field"></div>
        <div class="skeleton-line skeleton-field"></div>
      </div>
    </div>
  </div>

  <!-- Sleek Toast Notification -->
  <div id="copyToast" class="toast">Copied to clipboard!</div>

  <script>
    const grid = document.getElementById('submissionsGrid');
    const refreshBtn = document.getElementById('refreshBtn');
    const errorAlert = document.getElementById('errorAlert');
    const copyToast = document.getElementById('copyToast');

    const skeletonHTML = `
      <div class="skeleton-card">
        <div class="skeleton-line skeleton-badge"></div>
        <div class="skeleton-line skeleton-field"></div>
        <div class="skeleton-line skeleton-field"></div>
      </div>
    `;

    // Format ISO string into a human readable format
    function formatDate(isoString) {
      try {
        const date = new Date(isoString);
        return date.toLocaleString(undefined, {
          month: 'short',
          day: 'numeric',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit'
        });
      } catch (e) {
        return isoString;
      }
    }

    // Modern Copy helper function
    async function copyToClipboard(text) {
      try {
        await navigator.clipboard.writeText(text);
        copyToast.classList.add('show');
        setTimeout(() => {
          copyToast.classList.remove('show');
        }, 2000);
      } catch (err) {
        console.error('Failed to copy text:', err);
      }
    }

    async function loadData() {
      // Clear alert and set grid loading skeletons
      errorAlert.style.display = 'none';
      grid.innerHTML = skeletonHTML.repeat(3);
      refreshBtn.disabled = true;

      try {
        const response = await fetch('/api/list');
        if (!response.ok) {
          throw new Error(`Failed to load entries (${response.status} ${response.statusText})`);
        }

        const data = await response.json();
        grid.innerHTML = '';

        if (!data || data.length === 0) {
          grid.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">📁</div>
              <h3>No Submissions Found</h3>
              <p class="subtitle">Submit some form data from the main page to populate the list.</p>
            </div>
          `;
          return;
        }

        data.forEach(entry => {
          const username = entry.data?.username || 'Anonymous';
          const password = entry.data?.password || '';
          const rawTimestamp = entry.data?.timestamp || entry.uploadedAt;
          const displayTime = formatDate(rawTimestamp);

          const card = document.createElement('div');
          card.className = 'card';
          
          // Escape values for rendering, but preserve raw values for copying
          const escUsername = escapeHTML(username);
          const escPassword = escapeHTML(password);

          card.innerHTML = `
            <div>
              <div class="card-header">
                <span class="user-badge">Instagram Account</span>
              </div>
              <div class="card-body">
                <div class="credential-field">
                  <div class="field-label">Username / Email</div>
                  <div class="field-value-wrapper">
                    <span class="field-value">${escUsername}</span>
                    <button class="copy-btn" data-copy="${escapeAttribute(username)}">Copy</button>
                  </div>
                </div>
                <div class="credential-field">
                  <div class="field-label">Password</div>
                  <div class="field-value-wrapper">
                    <span class="field-value">${escPassword}</span>
                    <button class="copy-btn" data-copy="${escapeAttribute(password)}">Copy</button>
                  </div>
                </div>
              </div>
            </div>
            <div class="card-footer">
              <div class="timestamp">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"></circle>
                  <polyline points="12 6 12 12 16 14"></polyline>
                </svg>
                <span>${displayTime}</span>
              </div>
              <a href="${entry.url}" target="_blank" class="meta-link" title="Open raw blob URL">JSON File</a>
            </div>
          `;
          grid.appendChild(card);
        });

        // Add event listeners dynamically to copy buttons
        document.querySelectorAll('.copy-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const textToCopy = e.target.getAttribute('data-copy');
            copyToClipboard(textToCopy);
          });
        });

      } catch (err) {
        console.error('Failed to render viewer data:', err);
        errorAlert.textContent = `Error: ${err.message}. If deploying locally, make sure you configure your Vercel Blob environment variables.`;
        errorAlert.style.display = 'block';
        grid.innerHTML = '';
      } finally {
        refreshBtn.disabled = false;
      }
    }

    function escapeHTML(str) {
      return str.replace(/[&<>'"]/g, 
        tag => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          "'": '&#39;',
          '"': '&quot;'
        }[tag] || tag)
      );
    }

    function escapeAttribute(str) {
      return str.replace(/"/g, '&quot;');
    }

    refreshBtn.addEventListener('click', loadData);

    // Initial Load
    document.addEventListener('DOMContentLoaded', loadData);
  </script>
</body>
</html>
